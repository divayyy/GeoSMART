<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GeoSMART</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            height: 100vh;
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), 
                        url('assets/images/background1.png') center/cover no-repeat fixed;
            display: flex; align-items: center; justify-content: center; color: #fff;
            overflow: hidden;
        }
        .login-card {
            background: rgba(37, 99, 235, 0.2);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px; padding: 40px; width: 100%; max-width: 400px;
            text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            animation: slideUp 0.6s ease-out;
        }
        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .login-card input { 
            background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); 
        }
        .login-card input:focus { 
            background: rgba(255,255,255,0.2); color: white; border-color: #38bdf8; box-shadow: none; 
        }
        .btn-login {
            background: #2563eb; border: none; transition: 0.3s;
        }
        .btn-login:hover { background: #1d4ed8; transform: scale(1.02); }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="assets/images/geosmart.png" alt="Logo" width="120" class="mb-3">
        <h4 class="fw-bold">GeoSMART</h4>
        <p class="small text-white-50 mb-4">Masukkan nama untuk mulai belajar</p>
        
        <form id="loginForm">
            <div class="form-floating mb-3">
                <input type="text" class="form-control rounded-3" id="username" placeholder="Nama" required autocomplete="off">
                <label class="text-dark">Nama Pengguna</label>
            </div>
            <button type="submit" class="btn btn-login w-100 rounded-pill py-2 fw-bold text-white shadow">
                Masuk Sekarang
            </button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            localStorage.setItem('geo_user', user);
            window.location.href = 'dashboard.html';
        });

        // Redirect otomatis jika sudah ada sesi login
        window.onload = function() {
            if(localStorage.getItem('geo_user')) {
                window.location.href = 'dashboard.html';
            }
        };
    </script>
</body>
</html>
