<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - GeoSMART</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet"/>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            min-height: 100vh;
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), 
                        url('assets/images/background1.png') center/cover no-repeat fixed;
            color: #fff;
            overflow-x: hidden;
        }

        /* NAVBAR ATAS */
        .navbar-custom {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(56, 189, 248, 0.3);
            padding: 10px 5%;
        }

        .navbar-brand img {
            width: 40px; /* Ukuran logo di navbar */
            margin-right: 10px;
        }

        .btn-logout {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-logout:hover {
            background: #b91c1c;
            transform: scale(1.05);
        }

        /* HEADER & HERO */
        header { 
            text-align: center; 
            margin: 50px 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        /* Menghilangkan garis vertikal di dkt logo tengah */
        .logo-box {
            position: relative;
            display: inline-block;
            border: none; /* Memastikan tidak ada border */
        }
        
        .logo-box img { 
            width: 180px; 
            margin-bottom: 20px; 
            border: none;
        }

        .text-box h1 { font-size: 36px; font-weight: 700; }
        .text-box span { color: #facc15; }

        /* MENU CARDS */
        .menu-container {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: center;
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px 100px;
        }

        .menu-card {
            width: 250px;
            height: 160px;
            background: #1e293b;
            border: 2px solid #38bdf8;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #38bdf8;
            transition: 0.3s;
            box-shadow: 0 8px 0 #2563eb;
        }

        .menu-card:hover {
            transform: translateY(-10px);
            border-color: #facc15;
            color: #facc15;
            box-shadow: 0 15px 25px rgba(0,0,0,0.4);
        }

        .menu-card i { font-size: 3rem; margin-bottom: 10px; }
        .menu-card span { font-weight: 700; font-size: 18px; }

        /* AI BUTTON */
        .ai-button {
            position: fixed;
            right: 30px;
            bottom: 30px;
            padding: 15px 25px;
            border-radius: 50px;
            border: 2px solid #00ffd5;
            background: #0f172a;
            color: #00ffd5;
            font-weight: 600;
            text-decoration: none;
            box-shadow: 0 5px 15px rgba(0,255,213,0.3);
            z-index: 999;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-custom sticky-top">
        <div class="container-fluid d-flex align-items-center">
            <a class="navbar-brand text-white fw-bold d-flex align-items-center" href="#">
                <img src="assets/images/geosmart.png" alt="Logo">
                GeoSMART
            </a>
            <button class="btn-logout" onclick="aksiLogout()">
                <i class="fas fa-sign-out-alt me-2"></i>Keluar Akun
            </button>
        </div>
    </nav>

    <header>
        <div class="logo-box">
            <img src="assets/images/geosmart.png" alt="Logo Utama">
        </div>
        <div class="text-box">
            <h1>Halo, <span id="display-name">Siswa</span>!</h1>
            <p class="text-white-50">Selamat belajar kembali di GeoSMART</p>
        </div>
    </header>

    <main class="menu-container">
        <a href="materi.html" class="menu-card">
            <i class="fas fa-book-open"></i>
            <span>Materi</span>
        </a>
        <a href="videopembelajaran.html" class="menu-card">
            <i class="fas fa-play-circle"></i>
            <span>Video</span>
        </a>
        <a href="latihansoal.html" class="menu-card">
            <i class="fas fa-edit"></i>
            <span>Latihan Soal</span>
        </a>
    </main>

    <a href="https://gemini.google.com/app" target="_blank" class="ai-button">
        <i class="fas fa-robot me-2"></i> Tanya AI
    </a>

    <script>
        window.onload = function() {
            const user = localStorage.getItem('geo_user');
            if(!user) {
                window.location.href = 'index.html';
            } else {
                document.getElementById('display-name').innerText = user;
            }
        };

        function aksiLogout() {
            if(confirm("Apakah kamu yakin ingin keluar?")) {
                localStorage.removeItem('geo_user');
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
